worker_processes 1;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ---------------------------
    # Compression Gzip
    # ---------------------------
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ---------------------------
        # Sécurité des en-têtes
        # ---------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

        # Anti cross-origin leaks
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;

        # ---------------------------
        # Content Security Policy (CSP)
        # ---------------------------
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' https://umami.nizart.me 'unsafe-inline';
            style-src 'self' 'unsafe-inline';
            img-src 'self' data:;
            font-src 'self';
            connect-src 'self' https://umami.nizart.me;
            frame-ancestors 'self';
        " always;

        # ---------------------------
        # Caching long terme
        # ---------------------------
        location ~* \.(?:css|js|woff2?|eot|ttf|otf|svg|ico|jpg|jpeg|gif|png|webp|mp4|webm|avif|json|xml)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public, max-age=15552000, immutable";
        }

        # ---------------------------
        # HTTP/2 + TLS optimisations
        # ---------------------------
        http2_push_preload on;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;
    }
}